server.port=${PORT:8080}

# Database configurations
# Production: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD as env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hr_hiring_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Praveen@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT properties
jwt.secret=${JWT_SECRET:9aab56c12c3f4e8b919a3b8d4f2c5e7a9b0c1d2e3f4g5h6i7j8k9l0m1n2o3p4q}
jwt.expiration-ms=86400000

# File Upload sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Demo Mode & Environment
app.demo-mode=${APP_DEMO_MODE:true}
app.node-env=${NODE_ENV:development}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.ats=DEBUG

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson property naming strategy
spring.jackson.property-naming-strategy=SNAKE_CASE
