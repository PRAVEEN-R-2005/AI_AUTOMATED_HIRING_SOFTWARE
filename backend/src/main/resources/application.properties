server.port=${PORT:8080}

# ============================================
# Database — TiDB Cloud (MySQL-compatible)
# Env vars MUST be set in production.
# StartupValidator checks them at boot.
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.defer-datasource-initialization=true

# HikariCP — tuned for TiDB Cloud (cold starts, SSL, remote latency)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=600000

# JWT
jwt.secret=${JWT_SECRET:default-dev-secret-change-me}
jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App Mode
app.demo-mode=${APP_DEMO_MODE:true}
app.node-env=${NODE_ENV:development}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.ats=DEBUG

# JPA/Hibernate — TiDB is MySQL-compatible; Hibernate auto-detects dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
