server.port=${PORT:8080}

# Database configurations — env vars MUST be set in production (no localhost fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool — tolerate cloud DB cold starts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.initialization-fail-timeout=60000

# JWT properties
jwt.secret=${JWT_SECRET:default-dev-secret-change-me}
jwt.expiration-ms=86400000

# File Upload sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Demo Mode & Environment
app.demo-mode=${APP_DEMO_MODE:true}
app.node-env=${NODE_ENV:development}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.ats=DEBUG

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Jackson property naming strategy
spring.jackson.property-naming-strategy=SNAKE_CASE

